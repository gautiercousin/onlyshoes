<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    # DOCUMENT_ROOT sera remplacé par l'entrypoint
    DocumentRoot {{DOCUMENT_ROOT}}

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Configuration du répertoire
    # DOCUMENT_ROOT sera remplacé par l'entrypoint
    <Directory {{DOCUMENT_ROOT}}>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Support des fichiers .htaccess
    <IfModule mod_rewrite.c>
        RewriteEngine On
    </IfModule>

    # Bloquer l'accès direct aux fichiers sensibles
    <DirectoryMatch "^/var/www/html/(app|writable|tests|vendor)">
        Require all denied
    </DirectoryMatch>

    # Bloquer l'accès direct aux fichiers de configuration
    <FilesMatch "^\.env|\.git|\.gitignore|composer\.(json|lock)|phpunit\.xml">
        Require all denied
    </FilesMatch>

</VirtualHost>